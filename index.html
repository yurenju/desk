<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Caveat:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>desk-scaffold</title>
    <script>
      // Apply the theme before first paint so the page never flashes the
      // default (light) tokens, and so the theme is correct on load instead of
      // only after the ThemeToggle (lazily mounted inside the menu) renders.
      // Keep this logic in sync with src/lib/theme.ts (key + auto resolution).
      (function () {
        try {
          var pref = localStorage.getItem("desk.theme");
          if (pref !== "light" && pref !== "dark") {
            pref = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          document.documentElement.setAttribute("data-theme", pref);
        } catch (e) {
          /* localStorage/matchMedia unavailable — fall back to CSS :root default */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
